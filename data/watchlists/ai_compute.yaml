thesis: >
  AI算力仍处于基础设施扩张阶段，服务器、互联、液冷、供电和高端加速卡共同决定产业景气度。
catalysts:
  - 数据中心资本开支上修
  - GPU/加速卡出货改善
  - 液冷方案渗透率提升
  - 服务器订单确认
key_companies:
  - 浪潮信息
  - 中际旭创
  - 工业富联
  - 科大讯飞
observation_signals:
  - 数据中心上架率
  - 算力装机量
  - 机柜功率密度
  - 服务器订单增速
  - 液冷渗透率
quarterly_checks:
  - 资本开支是否延续增长
  - 订单兑现率是否匹配收入
  - 高密度机柜项目是否扩容
risk_flags:
  - 资本开支放缓
  - 订单延迟确认
  - 供电与散热瓶颈
scoring_rules:
  - 订单兑现优先于概念热度
  - 上架率与装机量高于短期情绪
  - 供电、散热、互联约束作为加分项
