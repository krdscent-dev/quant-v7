thesis: >
  先进封装是AI芯片和高性能计算升级的关键环节，产能、工艺成熟度和客户导入决定弹性。
catalysts:
  - 新产线进入爬坡
  - Chiplet导入进展
  - 2.5D/3D工艺成熟度提升
  - 客户验证数量增加
key_companies:
  - 北方华创
  - 长电科技
  - 通富微电
  - 华天科技
observation_signals:
  - 封装产能利用率
  - Chiplet导入进展
  - 2.5D/3D工艺成熟度
  - 设备和材料配套能力
  - 客户验证数量
quarterly_checks:
  - 新产线是否进入爬坡
  - 客户验证是否增加
  - 收入结构中先进封装占比是否提升
risk_flags:
  - 工艺爬坡慢
  - 客户导入延迟
  - 资本开支回收周期过长
scoring_rules:
  - 产能利用率和工艺成熟度是主线
  - 客户验证与收入占比用于确认商业化进度
  - 材料和设备配套能力用于判断壁垒
