thesis: >
  τ因子用于刻画价格行为、订单周期和信息强度的组合效应，适合作为横截面统计因子核心。
catalysts:
  - 风格轮动带来统计结构变化
  - 订单加速验证趋势延续
  - 媒体信号强化主题扩散
  - 波动结构进入可交易区间
key_companies:
  - 样本池全覆盖
  - 行业龙头对照组
  - 风格分层组合
observation_signals:
  - 价格时间衰减特征
  - 波动率分层
  - 反转强度
  - 量价背离
  - 媒体信号强度
quarterly_checks:
  - 因子分层收益是否稳定
  - 样本外表现是否衰减
  - 交易成本后收益是否可维持
risk_flags:
  - 因子漂移
  - 样本外失效
  - 因子拥挤交易
scoring_rules:
  - 优先识别可持续且可复现的统计特征
  - 反转和衰减特征需考虑交易成本
  - 横截面稳定性是核心过滤项
