  - theme_name: 玻璃基板
    items:
      - code: 600703.SH
        name: 三安光电
        theme: 玻璃基板
        investment_thesis: 先进材料与封装路线观察标的，关注新材料工艺验证和客户导入。
        key_catalysts:
          - 试产进度
          - 良率提升
          - 客户验证
        risk_factors:
          - 工艺验证失败
          - 量产节奏慢
          - 商业化进展不及预期
        watch_priority: A
      - code: 688002.SH
        name: 睿创微纳
        theme: 玻璃基板
        investment_thesis: 先进工艺和材料链条的辅助观察标的，关注相关技术突破外溢。
        key_catalysts:
          - 技术协同
          - 材料验证
          - 应用导入
        risk_factors:
          - 主题关联度弱
          - 业务兑现不强
          - 估值回撤
        watch_priority: C

  - theme_name: 人造金刚石
