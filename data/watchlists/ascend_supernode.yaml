thesis: >
  华为昇腾超节点从概念走向部署验证，订单、交付、生态伙伴和兼容适配决定受益范围。
catalysts:
  - 昇腾相关订单落地
  - 超节点部署规模提升
  - 生态伙伴扩张
  - 兼容适配完成度提高
key_companies:
  - 海光信息
  - 拓维信息
  - 神州数码
  - 东尼电子
observation_signals:
  - 昇腾相关订单
  - 超节点部署规模
  - 生态伙伴数量
  - 兼容适配进展
  - 供应链覆盖度
quarterly_checks:
  - 是否出现新增订单或交付节点
  - 生态适配是否规模化
  - 供应链受益标的收入占比是否变化
risk_flags:
  - 生态推进低于预期
  - 单一客户依赖
  - 市场情绪快于基本面
scoring_rules:
  - 实际订单、交付和部署优先
  - 生态扩张和适配进度高于短期情绪
  - 供应链覆盖度用于识别受益标的
