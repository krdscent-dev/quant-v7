thesis: >
  先进材料围绕玻璃基板、人造金刚石、超硬材料和关键工艺材料展开，验证节奏决定估值弹性。
catalysts:
  - 试产良率改善
  - 新材料验证通过
  - 产线投资落地
  - 下游客户导入
key_companies:
  - 天岳先进
  - 中兵红箭
  - 黄河旋风
  - 三安光电
observation_signals:
  - 试产进度
  - 良率提升
  - 材料验证节点
  - 产品价格走势
  - 工业应用扩展
quarterly_checks:
  - 试产与良率是否持续改善
  - 是否出现客户验证或小批量导入
  - 资本开支是否对应实质产线建设
risk_flags:
  - 工艺验证失败
  - 良率提升不足
  - 商业化进度不及预期
scoring_rules:
  - 试产、良率和客户验证优先
  - 产线投资仅作为中性偏正信号
  - 若缺少验证节点，概念分值应明显打折
