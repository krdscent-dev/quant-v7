thesis: >
  国产替代是中长期主线，真正的替代进展需要订单、认证和供应链安全三重验证。
catalysts:
  - 政策文件密集发布
  - 核心客户认证通过
  - 进口替代比例提升
  - 供应链安全事件触发重估
key_companies:
  - 北方华创
  - 中微公司
  - 士兰微
  - 沪硅产业
observation_signals:
  - 国产渗透率
  - 进口替代进度
  - 核心产品自给率
  - 客户认证进展
  - 政策支持强度
quarterly_checks:
  - 国产替代比例是否提升
  - 客户认证是否落地
  - 供应链安全等级是否改善
risk_flags:
  - 政策预期落空
  - 认证周期拉长
  - 替代进展不及市场预期
scoring_rules:
  - 以真实替代进度和客户验证为主
  - 政策催化仅作辅助项
  - 供应链安全与关键产品自给率优先
