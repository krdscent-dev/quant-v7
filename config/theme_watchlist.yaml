# V7 研究引擎主题观察清单
#
# 用途:
# - 作为周度/季度研究的主题总表
# - 为后续脚本提供主题论点、公司池、观察信号和风险信号
#
# 说明:
# - 这里使用研究口径，不直接构成投资建议
# - key_companies 为示例观察池，后续可按数据源和市值筛选动态更新

version: V7
market: A股
theme_count: 7

themes:
  - theme_name: AI算力
    thesis: AI基础设施投入仍处在扩张期，算力、互联、液冷和服务器订单是主线变量。
    key_companies:
      - 浪潮信息
      - 中际旭创
      - 科大讯飞
      - 工业富联
    observation_signals:
      - 数据中心上架率
      - GPU/加速卡出货
      - 服务器订单增速
      - 液冷渗透率
      - 机柜功率密度
    quarterly_checks:
      - 服务器和算力资本开支是否延续
      - 订单兑现率和收入确认是否匹配
      - 高功率密度项目是否扩容
    risk_signals:
      - 资本开支放缓
      - 订单延迟确认
      - 供电与散热瓶颈

  - theme_name: 华为昇腾超节点
    thesis: 昇腾生态从概念走向部署验证，超节点、兼容适配和生态伙伴扩张决定受益范围。
    key_companies:
      - 海光信息
      - 东尼电子
      - 拓维信息
      - 神州数码
    observation_signals:
      - 昇腾相关订单
      - 超节点部署规模
      - 生态伙伴数量
      - 兼容适配进展
      - 供应链覆盖度
    quarterly_checks:
      - 是否有新增订单或交付节点
      - 生态适配是否进入规模化
      - 供应链受益标的收入占比变化
    risk_signals:
      - 生态推进低于预期
      - 单一客户依赖
      - 市场情绪快于基本面

  - theme_name: τ因子
    thesis: τ因子用于刻画价格行为、订单周期与信息强度的组合效应，适合做横截面研究核心因子。
    key_companies:
      - 样本池全覆盖
      - 风格分层组合
      - 行业龙头对照组
    observation_signals:
      - 价格时间衰减特征
      - 波动率分层
      - 反转强度
      - 量价背离
      - 媒体信号强度
    quarterly_checks:
      - 因子分层收益是否稳定
      - 样本外表现是否衰减
      - 交易成本后收益是否可维持
    risk_signals:
      - 因子漂移
      - 样本外失效
      - 因子拥挤交易

  - theme_name: 国产替代
    thesis: 自主可控和供应链安全仍是中长期主线，真正的替代进展需要订单和认证验证。
    key_companies:
      - 士兰微
      - 平安银行
      - 北方华创
      - 中微公司
    observation_signals:
      - 国产渗透率
      - 进口替代进度
      - 核心产品自给率
      - 客户认证进展
      - 政策支持强度
    quarterly_checks:
      - 国产替代比例是否提升
      - 客户认证是否落地
      - 供应链安全等级是否改善
    risk_signals:
      - 政策预期落空
      - 认证周期拉长
      - 替代进展不及市场预期

  - theme_name: 玻璃基板
    thesis: 玻璃基板是先进封装工艺路线中的重要材料/工艺方向，试产、良率和客户验证最关键。
    key_companies:
      - 三安光电
      - 北方华创
      - 沪电股份
      - 博众精工
    observation_signals:
      - 试产进度
      - 良率提升
      - 材料验证节点
      - 设备导入情况
      - 客户导入数量
    quarterly_checks:
      - 试产与良率是否持续改善
      - 是否出现客户验证或小批量导入
      - 资本开支是否对应实质产线建设
    risk_signals:
      - 工艺验证失败
      - 良率提升不足
      - 商业化进度不及预期

  - theme_name: 人造金刚石
    thesis: 人造金刚石在超硬材料和工业应用中仍有结构性机会，产能、价格和应用扩展决定景气度。
    key_companies:
      - 天岳先进
      - 中兵红箭
      - 黄河旋风
      - 四方达
    observation_signals:
      - 单晶/多晶产能
      - 金刚石线渗透率
      - 工业应用扩展
      - 产品价格走势
      - 毛利率变化
    quarterly_checks:
      - 产能利用率是否稳定
      - 价格和毛利率是否改善
      - 下游应用是否扩展
    risk_signals:
      - 价格下行周期
      - 需求波动
      - 扩产带来供给过剩

  - theme_name: 先进封装
    thesis: 先进封装是AI芯片和高性能计算升级的关键环节，产能、工艺成熟度和客户导入决定弹性。
    key_companies:
      - 北方华创
      - 长电科技
      - 通富微电
      - 华天科技
    observation_signals:
      - 封装产能利用率
      - Chiplet导入进展
      - 2.5D/3D工艺成熟度
      - 设备和材料配套能力
      - 客户验证数量
    quarterly_checks:
      - 新产线是否进入爬坡
      - 客户验证是否增加
      - 收入结构中先进封装占比是否提升
    risk_signals:
      - 工艺爬坡慢
      - 客户导入延迟
      - 资本开支回收周期过长

governance:
  review_frequency: weekly
  quarterly_review_required: true
  output_destination: reports/
  note: 仅用于研究与观察，不构成投资建议。
